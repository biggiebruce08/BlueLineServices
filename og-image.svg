<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2042;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Accent Bar Left -->
  <rect width="6" height="630" fill="url(#accentGradient)"/>
  
  <!-- Decorative Circle Top Right -->
  <circle cx="1100" cy="80" r="120" fill="#2563eb" opacity="0.15"/>
  
  <!-- Decorative Circle Bottom Left -->
  <circle cx="100" cy="550" r="100" fill="#3b82f6" opacity="0.1"/>
  
  <!-- Truck Icon -->
  <g transform="translate(900, 340)">
    <!-- Truck Body -->
    <rect x="10" y="40" width="140" height="70" rx="4" fill="#3b82f6" opacity="0.9"/>
    <!-- Cab -->
    <path d="M 150 110 L 150 50 Q 150 40 160 40 L 220 40 Q 245 40 255 60 L 262 85 L 262 110 Z" fill="#60a5fa"/>
    <!-- Wheels -->
    <circle cx="50" cy="110" r="18" fill="#0a1628" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="50" cy="110" r="8" fill="#3b82f6"/>
    <circle cx="210" cy="110" r="18" fill="#0a1628" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="210" cy="110" r="8" fill="#3b82f6"/>
  </g>
  
  <!-- Main Text -->
  <text x="120" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#f8fafc" letter-spacing="2">
    BlueLine Hauling
  </text>
  
  <!-- Subtitle with accent -->
  <text x="120" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="600" fill="#60a5fa">
    &amp; Services
  </text>
  
  <!-- Description -->
  <text x="120" y="330" font-family="Arial, sans-serif" font-size="32" fill="#e2e8f0">
    Reliable Moving • Furniture Delivery • Junk Removal
  </text>
  
  <!-- Location & Phone -->
  <text x="120" y="390" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">
    College Station, TX • Same-Day Service
  </text>
  
  <!-- Call to Action -->
  <rect x="120" y="420" width="450" height="70" rx="8" fill="#2563eb" opacity="0.9"/>
  <text x="345" y="468" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#f8fafc" text-anchor="middle">
    Call (316) 519-6448
  </text>
  
  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accentGradient)"/>
</svg>